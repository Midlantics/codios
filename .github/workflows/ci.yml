name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Syntax check
        run: python -m py_compile $(find backend -name "*.py" | grep -v __pycache__)
      - name: Import check
        working-directory: backend
        env:
          DATABASE_URL: postgresql://x:x@localhost/x
          SUPABASE_JWT_SECRET: test-secret-min-32-chars-long-xxx
        run: python -c "import main"

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK with test extras
        working-directory: sdk-python
        run: pip install -e ".[fastapi]" pytest
      - name: Run tests
        working-directory: sdk-python
        run: pytest -v

  sdk-js:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        working-directory: sdk-js
        run: npm ci && npm run build
      - name: Run tests
        working-directory: sdk-js
        run: npm test

  cli:
    name: CLI (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install SDK first
        working-directory: sdk-js
        run: npm ci && npm run build
      - name: Install & build CLI
        working-directory: cli
        run: |
          npm install --save @codios/sdk@file:../sdk-js
          npm run build
      - name: CLI help check
        working-directory: cli
        run: node dist/index.js --help
